name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # 또는 master (자신의 기본 브랜치 이름에 맞게 수정)

# 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    # 내부 동작을 Node 24로 강제 지정 (경고 메시지 해결)
    env: 
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    # steps는 반드시 파일 내에 한 번만 선언되어야 합니다.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4